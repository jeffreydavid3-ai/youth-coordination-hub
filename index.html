<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youth Coordination Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=10">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- Auth / boot root (join or create ward) -->
<div id="auth-root"></div>

<!-- App shell — hidden until boot completes -->
<div class="app" id="app-shell" style="display:none;">
  <header class="topbar">
    <div>
      <div class="app-title">Youth Hub</div>
      <div class="ward-name" id="ward-name"></div>
    </div>
    <button class="demo-chip" id="mode-chip"></button>
  </header>

  <main id="view"></main>

  <nav class="tabbar">
    <button class="tab active" data-view="sundays">⛪ Sundays</button>
    <button class="tab" data-view="activities">🎯 Activities</button>
    <button class="tab" data-view="roster">👥 Roster</button>
  </nav>
</div>

<!-- Bottom-sheet member picker -->
<div class="sheet-backdrop" id="sheet-backdrop" style="display:none;">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title"></div>
    <div class="sheet-sub" id="sheet-sub"></div>
    <div class="sheet-list" id="sheet-list"></div>
  </div>
</div>

<div class="toast" id="toast" style="display:none;"></div>

<script src="./config.js?v=10"></script>
<script src="./db.js?v=10"></script>
<script src="./app.js?v=10"></script>
<script src="./auth.js?v=10"></script>
</body>
</html>
